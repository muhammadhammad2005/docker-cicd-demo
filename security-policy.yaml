security:
  vulnerability_scanning:
    enabled: true
    fail_on_critical: false
    severity_levels:
      - HIGH
      - CRITICAL

  container_compliance:
    enabled: true
    checks:
      - non_root_user
      - no_secrets_in_image
      - minimal_base_image
      - health_check_present

  registry_security:
    enabled: true
    scan_on_push: true
    quarantine_vulnerable_images: false

notifications:
  security_alerts:
    enabled: true
    channels:
      - email
